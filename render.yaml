services:
  - type: web
    name: college-bus-tracking-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard (keep secret)
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard (keep secret)
      - key: FRONTEND_URL
        sync: false   # Add your Vercel URL here after deploying frontend
